<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rural Exam Boost</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
width:95%;
max-width:520px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#2a5298;
margin-bottom:5px;
}

.details{
font-size:13px;
color:gray;
line-height:1.5;
margin-bottom:15px;
}

button{
padding:12px;
margin:8px 0;
width:100%;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

.primary{
background:#2a5298;
color:white;
}

.primary:hover{
background:#1e3c72;
}

.option{
background:#f1f3f6;
border:1px solid #ddd;
}

.option.selected{
background:#2a5298;
color:white;
}

.hidden{
display:none;
}

.progress-bar{
height:10px;
background:#ddd;
border-radius:5px;
overflow:hidden;
margin:10px 0;
}

.progress{
height:100%;
width:0%;
background:#2a5298;
}

.timer{
font-weight:bold;
color:#d9534f;
}

.counter{
font-size:13px;
color:gray;
}

input{
padding:10px;
width:90%;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="container">

<h1>Rural Exam Boost</h1>

<div class="details">
Developed by: <b>Abdulkarim Adamu Mohammed (3MTT)</b><br>
Fellow ID: FE/23/13820118<br>
Email: azzabaab@gmail.com<br>
Phone: 09039042932
</div>

<p id="homeText">Low‑data WAEC/NECO practice platform for rural students.</p>

<div id="subjectSection">
<button class="primary" onclick="startQuiz('math')">Mathematics</button>
<button class="primary" onclick="startQuiz('english')">English</button>
</div>

<div id="quizSection" class="hidden">

<div class="timer">Time Left: <span id="time">30</span>s</div>

<div class="counter" id="counter"></div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<h3 id="question"></h3>

<div id="options"></div>

<button class="primary" onclick="nextQuestion()">Next</button>

</div>

<div id="resultSection" class="hidden">

<h2>Your Result</h2>

<p id="score"></p>

<input id="studentName" placeholder="Enter your name for certificate">

<button class="primary" onclick="downloadCertificate()">Download Certificate</button>

<button class="primary" onclick="location.reload()">Restart</button>

<canvas id="certificateCanvas" width="800" height="500" class="hidden"></canvas>

</div>

</div>

<script>

const questionBank = {

math:[
{question:"5 × 6 = ?",options:["11","30","25","56"],answer:"30"},
{question:"12 ÷ 3 = ?",options:["2","4","6","3"],answer:"4"},
{question:"9² = ?",options:["18","81","72","27"],answer:"81"}
],

english:[
{question:"Synonym of Happy?",options:["Sad","Joyful","Angry","Cold"],answer:"Joyful"},
{question:"Opposite of Hot?",options:["Warm","Cold","Boil","Heat"],answer:"Cold"},
{question:"Correct spelling?",options:["Recieve","Receive","Recive","Receve"],answer:"Receive"}
]

}

let questions=[]
let currentQuestion=0
let score=0
let selectedAnswer=null
let timer
let timeLeft=30

function startQuiz(subject){

questions=questionBank[subject]

document.getElementById("subjectSection").classList.add("hidden")
document.getElementById("homeText").classList.add("hidden")
document.getElementById("quizSection").classList.remove("hidden")

currentQuestion=0
score=0
timeLeft=30

startTimer()
loadQuestion()

}

function loadQuestion(){

const q=questions[currentQuestion]

document.getElementById("question").textContent=q.question

document.getElementById("counter").textContent=
"Question "+(currentQuestion+1)+" of "+questions.length

const optionsDiv=document.getElementById("options")

optionsDiv.innerHTML=""

q.options.forEach(option=>{

const btn=document.createElement("button")

btn.textContent=option

btn.classList.add("option")

btn.onclick=()=>{

selectedAnswer=option

document.querySelectorAll(".option").forEach(b=>b.classList.remove("selected"))

btn.classList.add("selected")

}

optionsDiv.appendChild(btn)

})

updateProgress()

}

function nextQuestion(){

if(!selectedAnswer) return

if(selectedAnswer===questions[currentQuestion].answer){

score++

}

selectedAnswer=null

currentQuestion++

if(currentQuestion<questions.length){

loadQuestion()

}else{

showResult()

}

}

function showResult(){

clearInterval(timer)

document.getElementById("quizSection").classList.add("hidden")

document.getElementById("resultSection").classList.remove("hidden")

let percentage=Math.round((score/questions.length)*100)

document.getElementById("score").textContent=
"You scored "+score+" / "+questions.length+" ("+percentage+"%)"

}

function updateProgress(){

let percent=(currentQuestion/questions.length)*100

document.getElementById("progress").style.width=percent+"%"

}

function startTimer(){

document.getElementById("time").textContent=timeLeft

timer=setInterval(()=>{

timeLeft--

document.getElementById("time").textContent=timeLeft

if(timeLeft<=0){

showResult()

}

},1000)

}

function downloadCertificate(){

const name=document.getElementById("studentName").value
if(!name) return alert("Enter your name first")

const canvas=document.getElementById("certificateCanvas")
const ctx=canvas.getContext("2d")

ctx.fillStyle="#ffffff"
ctx.fillRect(0,0,800,500)

ctx.strokeStyle="#d4af37"
ctx.lineWidth=10
ctx.strokeRect(20,20,760,460)

ctx.fillStyle="#2a5298"
ctx.font="bold 40px Georgia"
ctx.textAlign="center"
ctx.fillText("Certificate of Achievement",400,120)

ctx.fillStyle="#000"
ctx.font="22px Arial"
ctx.fillText("This certifies that",400,200)

ctx.font="bold 34px Arial"
ctx.fillText(name,400,260)

ctx.font="20px Arial"
ctx.fillText("successfully completed the",400,320)
ctx.fillText("Rural Exam Boost Practice Test",400,350)

ctx.font="18px Arial"
ctx.fillText("Developed by Abdulkarim Adamu Mohammed",400,420)

const link=document.createElement("a")
link.download="Rural_Exam_Boost_Certificate.png"
link.href=canvas.toDataURL()
link.click()

}

</script>

</body>
</html>
