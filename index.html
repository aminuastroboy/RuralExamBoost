<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RuralExamBoost CBT</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }
    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    .hidden { display: none !important; }
    h1, h2, h3 { margin-top: 0; }
    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d0d7e2;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 15px;
    }
    button {
      border: none;
      background: #1f4e79;
      color: white;
      cursor: pointer;
    }
    button:hover { opacity: 0.95; }
    .btn-green { background: #198754; }
    .btn-gray { background: #6c757d; }
    .btn-orange { background: #fd7e14; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .question-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .nav-btn {
      padding: 10px;
      background: #e9eef5;
      color: #111;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }
    .nav-btn.answered {
      background: #198754;
      color: white;
    }
    .nav-btn.current {
      outline: 3px solid #1f4e79;
    }
    .option {
      background: #eef3f8;
      color: #111;
      text-align: left;
      border: 1px solid #d8e0ea;
    }
    .option.selected {
      background: #1f4e79;
      color: white;
    }
    .action-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #dde6f0;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 16px;
    }
    .progress {
      height: 100%;
      width: 0%;
      background: #198754;
      transition: width 0.3s ease;
    }
    .score-box {
      font-size: 18px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="setupScreen">
      <h1>RuralExamBoost CBT</h1>
      <p>SS3 Nigerian-level practice exam</p>

      <label>Student Name</label>
      <input id="studentName" placeholder="Enter your full name" />

      <label>Select Subject</label>
      <select id="subjectSelect">
        <option value="">Choose a subject</option>
        <option value="english">English Language</option>
        <option value="mathematics">Mathematics</option>
        <option value="biology">Biology</option>
        <option value="chemistry">Chemistry</option>
        <option value="physics">Physics</option>
        <option value="economics">Economics</option>
        <option value="government">Government</option>
        <option value="mixed">Mixed SS3 CBT</option>
      </select>

      <button onclick="startExam()">Start CBT Exam</button>
    </div>

    <div class="card hidden" id="examScreen">
      <div class="topbar">
        <div><strong>Name:</strong> <span id="displayName"></span></div>
        <div><strong>Subject:</strong> <span id="displaySubject"></span></div>
        <div><strong>Time Left:</strong> <span id="timeLeft"></span></div>
      </div>

      <div class="progress-wrap">
        <div class="progress" id="progressBar"></div>
      </div>

      <p><strong>Question <span id="questionNumber"></span></strong></p>
      <h3 id="questionText"></h3>

      <div id="optionsBox"></div>

      <div class="action-row">
        <button class="btn-gray" onclick="prevQuestion()">Previous</button>
        <button class="btn-orange" onclick="nextQuestion()">Next</button>
        <button class="btn-green" onclick="submitExam()">Submit</button>
      </div>

      <div class="question-nav" id="questionNav"></div>
    </div>

    <div class="card hidden" id="resultScreen">
      <h2>CBT Result</h2>
      <div class="score-box">
        <p><strong>Name:</strong> <span id="resultName"></span></p>
        <p><strong>Subject:</strong> <span id="resultSubject"></span></p>
        <p><strong>Score:</strong> <span id="resultScore"></span></p>
        <p><strong>Percentage:</strong> <span id="resultPercent"></span></p>
        <p><strong>Remark:</strong> <span id="resultRemark"></span></p>
      </div>
      <button onclick="restartExam()">Take Another Exam</button>
    </div>
  </div>

  <script>
    const questionBank = {
      english: [
        {
          question: "Choose the option nearest in meaning to the underlined word: The teacher's explanation was lucid.",
          options: ["Confusing", "Clear", "Lengthy", "Harsh"],
          answer: "Clear"
        },
        {
          question: "Choose the correct sentence.",
          options: [
            "She go to school every day.",
            "She goes to school every day.",
            "She going to school every day.",
            "She gone to school every day."
          ],
          answer: "She goes to school every day."
        },
        {
          question: "A group of students is called a?",
          options: ["Flock", "Team", "Class", "Crowd"],
          answer: "Class"
        },
        {
          question: "Choose the antonym of 'scarcity'.",
          options: ["Shortage", "Lack", "Abundance", "Need"],
          answer: "Abundance"
        },
        {
          question: "A passage discussing dangers of cutting trees is mainly about?",
          options: ["Transportation", "Deforestation", "Cooking", "Mining"],
          answer: "Deforestation"
        }
      ],
      mathematics: [
        {
          question: "Solve: 2x + 5 = 17",
          options: ["5", "6", "7", "8"],
          answer: "6"
        },
        {
          question: "Find the area of a triangle with base 10cm and height 8cm.",
          options: ["18 cm²", "40 cm²", "80 cm²", "20 cm²"],
          answer: "40 cm²"
        },
        {
          question: "If y = 3 and x = 4, find xy.",
          options: ["7", "12", "1", "16"],
          answer: "12"
        },
        {
          question: "What is the square root of 81?",
          options: ["8", "7", "9", "6"],
          answer: "9"
        },
        {
          question: "Simplify 15 ÷ 3 × 2.",
          options: ["10", "5", "6", "12"],
          answer: "10"
        }
      ],
      biology: [
        {
          question: "Which of the following is a producer?",
          options: ["Goat", "Lion", "Grass", "Human"],
          answer: "Grass"
        },
        {
          question: "The organ responsible for filtering blood is the?",
          options: ["Heart", "Liver", "Kidney", "Lung"],
          answer: "Kidney"
        },
        {
          question: "Photosynthesis occurs mainly in the?",
          options: ["Root", "Stem", "Leaf", "Flower"],
          answer: "Leaf"
        },
        {
          question: "The basic unit of life is the?",
          options: ["Tissue", "Cell", "Organ", "Blood"],
          answer: "Cell"
        },
        {
          question: "Which of these is a vertebrate?",
          options: ["Earthworm", "Snail", "Fish", "Cockroach"],
          answer: "Fish"
        }
      ],
      chemistry: [
        {
          question: "Water is made up of?",
          options: ["Oxygen only", "Hydrogen only", "Hydrogen and Oxygen", "Nitrogen and Oxygen"],
          answer: "Hydrogen and Oxygen"
        },
        {
          question: "Which element is a noble gas?",
          options: ["Oxygen", "Neon", "Sodium", "Chlorine"],
          answer: "Neon"
        },
        {
          question: "The chemical symbol for sodium is?",
          options: ["So", "Sd", "Na", "Sm"],
          answer: "Na"
        },
        {
          question: "An acid turns blue litmus paper to?",
          options: ["Green", "Red", "White", "Black"],
          answer: "Red"
        },
        {
          question: "The smallest particle of an element is the?",
          options: ["Molecule", "Atom", "Cell", "Ion only"],
          answer: "Atom"
        }
      ],
      physics: [
        {
          question: "Speed = Distance / ?",
          options: ["Force", "Work", "Time", "Mass"],
          answer: "Time"
        },
        {
          question: "Unit of electric current is?",
          options: ["Volt", "Ampere", "Watt", "Ohm"],
          answer: "Ampere"
        },
        {
          question: "The force pulling objects toward the earth is?",
          options: ["Friction", "Gravity", "Tension", "Pressure"],
          answer: "Gravity"
        },
        {
          question: "A device used to measure temperature is?",
          options: ["Barometer", "Thermometer", "Ammeter", "Hydrometer"],
          answer: "Thermometer"
        },
        {
          question: "The SI unit of force is?",
          options: ["Joule", "Newton", "Pascal", "Meter"],
          answer: "Newton"
        }
      ],
      economics: [
        {
          question: "The law of demand states that?",
          options: [
            "As price rises, demand rises",
            "As price rises, demand falls",
            "Demand is constant",
            "Supply falls always"
          ],
          answer: "As price rises, demand falls"
        },
        {
          question: "Money used to buy goods and services is called?",
          options: ["Capital", "Labour", "Currency", "Revenue"],
          answer: "Currency"
        },
        {
          question: "A market where there is only one seller is?",
          options: ["Perfect market", "Monopoly", "Duopoly", "Oligopoly"],
          answer: "Monopoly"
        },
        {
          question: "Human effort used in production is called?",
          options: ["Labour", "Capital", "Land", "Demand"],
          answer: "Labour"
        },
        {
          question: "Government income from citizens is mainly through?",
          options: ["Punishment", "Taxation", "Loans only", "Imports only"],
          answer: "Taxation"
        }
      ],
      government: [
        {
          question: "Democracy is best defined as?",
          options: [
            "Government by soldiers",
            "Government of the people, by the people, for the people",
            "Government by kings",
            "Government without laws"
          ],
          answer: "Government of the people, by the people, for the people"
        },
        {
          question: "The arm of government that makes laws is the?",
          options: ["Executive", "Legislature", "Judiciary", "Civil service"],
          answer: "Legislature"
        },
        {
          question: "Nigeria operates a?",
          options: ["Monarchy", "Military system", "Federal system", "Communal system"],
          answer: "Federal system"
        },
        {
          question: "Voting rights in a democracy are called?",
          options: ["Franchise", "Mandate", "Authority", "Rule"],
          answer: "Franchise"
        },
        {
          question: "The constitution is?",
          options: [
            "A school rule book",
            "A book of stories",
            "The supreme law of the land",
            "A tax record"
          ],
          answer: "The supreme law of the land"
        }
      ]
    };

    let activeQuestions = [];
    let answers = [];
    let currentIndex = 0;
    let timer = null;
    let timeRemaining = 0;
    let student = "";
    let subject = "";

    function getMixedQuestions() {
      return [
        questionBank.english[0],
        questionBank.mathematics[0],
        questionBank.biology[0],
        questionBank.chemistry[0],
        questionBank.physics[0],
        questionBank.economics[0],
        questionBank.government[0],
        questionBank.english[1],
        questionBank.mathematics[1],
        questionBank.biology[1]
      ];
    }

    function startExam() {
      student = document.getElementById("studentName").value.trim();
      subject = document.getElementById("subjectSelect").value;

      if (!student || !subject) {
        alert("Please enter your name and select a subject.");
        return;
      }

      activeQuestions = subject === "mixed"
        ? getMixedQuestions()
        : [...questionBank[subject]];

      activeQuestions = shuffleArray(activeQuestions);
      activeQuestions = activeQuestions.map(q => ({
        ...q,
        options: shuffleArray([...q.options])
      }));

      answers = new Array(activeQuestions.length).fill(null);
      currentIndex = 0;
      timeRemaining = activeQuestions.length * 45;

      document.getElementById("setupScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("examScreen").classList.remove("hidden");

      document.getElementById("displayName").textContent = student;
      document.getElementById("displaySubject").textContent = formatSubject(subject);

      startTimer();
      renderQuestion();
      renderQuestionNav();
    }

    function formatSubject(value) {
      const names = {
        english: "English Language",
        mathematics: "Mathematics",
        biology: "Biology",
        chemistry: "Chemistry",
        physics: "Physics",
        economics: "Economics",
        government: "Government",
        mixed: "Mixed SS3 CBT"
      };
      return names[value] || value;
    }

    function renderQuestion() {
      const q = activeQuestions[currentIndex];
      document.getElementById("questionNumber").textContent = `${currentIndex + 1} of ${activeQuestions.length}`;
      document.getElementById("questionText").textContent = q.question;

      const optionsBox = document.getElementById("optionsBox");
      optionsBox.innerHTML = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = option;

        if (answers[currentIndex] === option) {
          btn.classList.add("selected");
        }

        btn.onclick = () => {
          answers[currentIndex] = option;
          renderQuestion();
          renderQuestionNav();
          updateProgress();
        };

        optionsBox.appendChild(btn);
      });

      updateProgress();
      renderQuestionNav();
    }

    function renderQuestionNav() {
      const nav = document.getElementById("questionNav");
      nav.innerHTML = "";

      activeQuestions.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        btn.className = "nav-btn";

        if (answers[index] !== null) btn.classList.add("answered");
        if (index === currentIndex) btn.classList.add("current");

        btn.onclick = () => {
          currentIndex = index;
          renderQuestion();
        };

        nav.appendChild(btn);
      });
    }

    function nextQuestion() {
      if (currentIndex < activeQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function updateProgress() {
      const answered = answers.filter(a => a !== null).length;
      const percent = (answered / activeQuestions.length) * 100;
      document.getElementById("progressBar").style.width = percent + "%";
    }

    function startTimer() {
      clearInterval(timer);
      updateTimerDisplay();

      timer = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();

        if (timeRemaining <= 0) {
          clearInterval(timer);
          submitExam();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const mins = Math.floor(timeRemaining / 60);
      const secs = timeRemaining % 60;
      document.getElementById("timeLeft").textContent =
        `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function submitExam() {
      clearInterval(timer);

      let score = 0;
      activeQuestions.forEach((q, index) => {
        if (answers[index] === q.answer) score++;
      });

      const percent = Math.round((score / activeQuestions.length) * 100);

      let remark = "Needs more practice";
      if (percent >= 80) remark = "Excellent";
      else if (percent >= 60) remark = "Very Good";
      else if (percent >= 50) remark = "Good";

      document.getElementById("examScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      document.getElementById("resultName").textContent = student;
      document.getElementById("resultSubject").textContent = formatSubject(subject);
      document.getElementById("resultScore").textContent = `${score} / ${activeQuestions.length}`;
      document.getElementById("resultPercent").textContent = `${percent}%`;
      document.getElementById("resultRemark").textContent = remark;
    }

    function restartExam() {
      clearInterval(timer);
      document.getElementById("studentName").value = "";
      document.getElementById("subjectSelect").value = "";
      document.getElementById("setupScreen").classList.remove("hidden");
      document.getElementById("examScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>
</body>
</html>
